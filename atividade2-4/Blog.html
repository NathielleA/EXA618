<html>

<head>
    <title>My Blog</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <script type="application/javascript">
        function send(event) {
            const data = {
                "message": document.getElementById("msg").value,
                "author": document.getElementById("autor").value
            };
            const json_data = JSON.stringify(data);
            const header = {
                "Content-Type": "application/json"
            };
            const url = "https://script.google.com/macros/s/AKfycbzBn3sALe1rYjz7Ze-Ik7q9TEVP0I2V3XX7GNcecWP8NvCzGt4yO_RT1OlQp09TE9cU/exec";
            fetch(url, {
                method: "POST",
                body: json_data,
                headers: header,
                mode: "no-cors"
            });
            
        }

        function loadMessages() {
            const url = "https://script.google.com/macros/s/AKfycbzBn3sALe1rYjz7Ze-Ik7q9TEVP0I2V3XX7GNcecWP8NvCzGt4yO_RT1OlQp09TE9cU/exec";
            fetch(url, {
                method: "GET",
                mode: "cors"
            })
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    const messagesDiv = document.getElementById("messages");
                    messagesDiv.innerHTML = "";
                    data.forEach(function (item) {
                        const messageElement = document.createElement("p");
                        messageElement.textContent = item[0] + ": " + item[1];
                        messagesDiv.appendChild(messageElement);
                    });
                })
                .catch(function (error) {
                    console.error("Erro ao carregar mensagens:", error);
                });
        }
    </script>
</head>

<body>
    <H1 align="center">Mensagem:</H1>
    <HR><br>
    <form>
        <label>Mensagem:</label>
        <input type="text" size=64 name="msg" id="msg"><br><br>
        <label>Autor:</label>
        <input type="text" size=64 name="autor" id="autor">
        <br><br>
        <button type="button" onclick="send()">Enviar</button>
    </form>
    <hr>
    <h2>Mensagens:</h2>
    <div id="messages"></div>
    <script type="application/javascript">
        loadMessages();
    </script>
</body>

</html>
